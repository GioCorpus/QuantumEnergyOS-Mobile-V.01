# ⚡ QuantumEnergyOS Mobile - Configuración Termux
# Sistema Operativo Móvil Cuántico para Gestión de Energía
# Autor: Giovanny Corpus Bernal - Mexicali, Baja California

# ============================================
# Configuración de Termux
# ============================================

# Almacenamiento
storage:
  internal: "/data/data/com.termux/files/home"
  external: "/sdcard/QuantumEnergyOS"
  database: "/data/data/com.termux/files/home/quantum-energy/data"
  logs: "/data/data/com.termux/files/home/quantum-energy/logs"

# Red
network:
  host: "0.0.0.0"
  port: 8080
  allowed_hosts:
    - "localhost"
    - "127.0.0.1"
    - "10.0.2.2"  # Emulador Android
    - "192.168.*"  # Red local

# Permisos de Termux
permissions:
  storage: true
  network: true
  wake_lock: true
  boot_completed: true

# Servicios
services:
  api_server:
    enabled: true
    auto_start: true
    port: 8080
    log_file: "logs/api_server.log"
  
  energy_monitor:
    enabled: true
    auto_start: true
    interval: 1
    log_file: "logs/energy_monitor.log"
  
  quantum_engine:
    enabled: true
    auto_start: true
    log_file: "logs/quantum_engine.log"

# Optimizaciones para dispositivos de bajos recursos
optimization:
  low_memory: true
  max_memory_mb: 512
  gc_interval: 60
  cache_size_mb: 64
  disable_animations: false
  reduce_particles: true

# Variables de entorno
environment:
  PYTHONPATH: "/data/data/com.termux/files/home/quantum-energy"
  QUANTUM_ENERGY_HOME: "/data/data/com.termux/files/home/quantum-energy"
  QUANTUM_ENERGY_MODE: "production"
  TERMUX_VERSION: "0.118.0"

# Inicio automático
autostart:
  enabled: true
  script: "scripts/start.sh"
  delay_seconds: 5

# Notificaciones
notifications:
  enabled: true
  alerts: true
  updates: true
  sound: true
  vibration: true

# Backup
backup:
  enabled: true
  interval_hours: 24
  location: "/sdcard/QuantumEnergyOS/backups"
  keep_days: 7

# Actualizaciones
updates:
  auto_check: true
  check_interval_hours: 24
  auto_update: false
  notify: true
