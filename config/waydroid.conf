# ⚡ QuantumEnergyOS Mobile - Configuración Waydroid
# Sistema Operativo Móvil Cuántico para Gestión de Energía
# Autor: Giovanny Corpus Bernal - Mexicali, Baja California

# ============================================
# Configuración de Waydroid
# ============================================

# Contenedor Android
container:
  name: "quantum-energy-os"
  android_version: "11"
  architecture: "x86_64"
  gpu: "auto"
  network_mode: "bridge"

# Almacenamiento
storage:
  system: "/var/lib/waydroid"
  data: "/home/quantum-energy/data"
  logs: "/home/quantum-energy/logs"
  shared: "/home/quantum-energy/shared"

# Red
network:
  bridge_name: "waydroid0"
  ip_range: "192.168.240.0/24"
  gateway: "192.168.240.1"
  dns:
    - "8.8.8.8"
    - "8.8.4.4"
  port_forwarding:
    - host: 8080
      container: 8080
    - host: 443
      container: 443

# Hardware
hardware:
  cpu_cores: 2
  memory_mb: 1024
  storage_mb: 4096
  camera: false
  gps: false
  sensors: true

# Gráficos
graphics:
  renderer: "auto"
  resolution: "720x1280"
  dpi: 240
  fps: 60
  hardware_acceleration: true

# Audio
audio:
  enabled: true
  backend: "pulseaudio"
  sample_rate: 44100
  channels: 2

# Servicios
services:
  api_server:
    enabled: true
    auto_start: true
    port: 8080
    bind_address: "0.0.0.0"
  
  energy_monitor:
    enabled: true
    auto_start: true
    interval: 1
  
  quantum_engine:
    enabled: true
    auto_start: true

# Optimizaciones
optimization:
  low_memory_mode: true
  zram_enabled: true
  zram_size_mb: 512
  kernel_samepage_merging: true
  disable_animations: false
  reduce_particles: true

# Variables de entorno
environment:
  QUANTUM_ENERGY_HOME: "/home/quantum-energy"
  QUANTUM_ENERGY_MODE: "production"
  ANDROID_DATA: "/data"
  ANDROID_ROOT: "/system"
  WAYDROID_VERSION: "1.4.2"

# Inicio automático
autostart:
  enabled: true
  script: "/home/quantum-energy/scripts/start.sh"
  delay_seconds: 10
  boot_completed: true

# Notificaciones
notifications:
  enabled: true
  alerts: true
  updates: true
  sound: true
  vibration: true

# Backup
backup:
  enabled: true
  interval_hours: 24
  location: "/home/quantum-energy/backups"
  keep_days: 7
  include_data: true
  include_config: true

# Actualizaciones
updates:
  auto_check: true
  check_interval_hours: 24
  auto_update: false
  notify: true
  source: "github"

# Logging
logging:
  level: "INFO"
  file: "/home/quantum-energy/logs/waydroid.log"
  max_size_mb: 100
  backup_count: 5

# Seguridad
security:
  selinux: "permissive"
  root_access: false
  adb_enabled: false
  developer_options: false

# Debug
debug:
  enabled: false
  adb_port: 5555
  log_level: "DEBUG"
  verbose: false
